name: Deploy GitHub Pages

on:
  # 不再随 push 到 main 自动部署；只手动触发（gh workflow run deploy-pages.yml）。
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site/site _site/public
          cp site/index.html _site/index.html
          cp site/styles.css _site/site/styles.css
          cp site/script.js _site/site/script.js
          cp -R public/assets _site/public/assets

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
