name: Build Release Packages

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish. Use latest for the rolling website download."
        required: true
        default: "latest"

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-latest
            npm_script: dist:mac:arm64
            artifact: profilepilot-macos-arm64
          - name: macOS x64
            os: macos-latest
            npm_script: dist:mac:x64
            artifact: profilepilot-macos-x64
          - name: Windows x64
            os: windows-latest
            npm_script: dist:win
            artifact: profilepilot-windows-x64
    env:
      BUILD_RETRIES: "5"
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_BUILDER_BINARIES_MIRROR: "https://npmmirror.com/mirrors/electron-builder-binaries/"
      ELECTRON_MIRROR: "https://npmmirror.com/mirrors/electron/"
      npm_config_electron_builder_binaries_mirror: "https://npmmirror.com/mirrors/electron-builder-binaries/"
      npm_config_electron_mirror: "https://npmmirror.com/mirrors/electron/"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build packages
        run: node scripts/retry-command.mjs npm run ${{ matrix.npm_script }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="latest"
          fi

          if [[ "$tag" == "latest" ]]; then
            name="ProfilePilot latest"
          else
            name="ProfilePilot $tag"
          fi

          {
            echo "tag=$tag"
            echo "name=$name"
          } >> "$GITHUB_OUTPUT"

      - name: Move rolling latest tag
        if: steps.release_meta.outputs.tag == 'latest'
        run: |
          git tag -f latest "$GITHUB_SHA"
          git push -f origin latest

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: release-assets/*
