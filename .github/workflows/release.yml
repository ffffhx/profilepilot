name: Build Release Packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-latest
            npm_script: dist:mac:arm64
            artifact: profilepilot-macos-arm64
          - name: macOS x64
            os: macos-latest
            npm_script: dist:mac:x64
            artifact: profilepilot-macos-x64
          - name: Windows x64
            os: windows-latest
            npm_script: dist:win
            artifact: profilepilot-windows-x64
    env:
      BUILD_RETRIES: "5"
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_BUILDER_BINARIES_MIRROR: "https://npmmirror.com/mirrors/electron-builder-binaries/"
      ELECTRON_MIRROR: "https://npmmirror.com/mirrors/electron/"
      npm_config_electron_builder_binaries_mirror: "https://npmmirror.com/mirrors/electron-builder-binaries/"
      npm_config_electron_mirror: "https://npmmirror.com/mirrors/electron/"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build packages
        run: node scripts/retry-command.mjs npm run ${{ matrix.npm_script }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ProfilePilot ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
