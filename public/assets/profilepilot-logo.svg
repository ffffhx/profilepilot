  <text x="196" y="112" font-family="'Chakra Petch', 'PingFang SC', -apple-system, 'Segoe UI', sans-serif" font-size="74" font-weight="700" letter-spacing="0.5" fill="#e6eef2">Profile<tspan fill="#38e1a0">Pilot</tspan></text>
