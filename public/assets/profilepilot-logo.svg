      <stop offset="0%" stop-color="#17262f"/>
      <stop offset="100%" stop-color="#0a1014"/>
    </radialGradient>
    <linearGradient id="ppl-plane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#82f5c9"/>
      <stop offset="100%" stop-color="#2bbd86"/>
    </linearGradient>
    <filter id="ppl-glow" x="-40%" y="-40%" width="180%" height="180%">
