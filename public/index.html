<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ProfilePilot</title>
    <link rel="icon" href="./assets/profilepilot-mark.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div id="app" class="app-loading">Loading...</div>
    <script>
      // 入场动画只在启动时播放一次；之后 UI 重渲染不再触发（见 styles.css 的 body:not(.booted)）
      window.addEventListener("load", () => {
        setTimeout(() => document.body.classList.add("booted"), 800);
      });
    </script>
    <script src="../dist/renderer/app.js"></script>
  </body>
</html>
